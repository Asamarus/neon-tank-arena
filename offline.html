<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#050a11"
    />
    <title>Neon Tank Arena — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at 50% 25%, #12324a, #050a11 58%);
        color: #e8f8ff;
        font:
          16px/1.5 system-ui,
          sans-serif;
        text-align: center;
      }
      main {
        max-width: 520px;
        padding: 30px;
        border: 1px solid #2a7189;
        border-radius: 22px;
        background: #08131fcc;
        box-shadow: 0 24px 70px #0008;
      }
      h1 {
        margin: 0 0 8px;
        color: #77efff;
        letter-spacing: 0.08em;
      }
      p {
        color: #a9c0cc;
      }
      a {
        display: inline-block;
        margin-top: 12px;
        padding: 12px 18px;
        border: 1px solid #65efff;
        border-radius: 12px;
        color: #051119;
        background: #65efff;
        font-weight: 900;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NEON TANK ARENA</h1>
      <p>The requested page is unavailable offline, but the cached game itself is ready.</p>
      <a href="./">OPEN OFFLINE GAME</a>
      <p>Build V1.0.1</p>
    </main>
  </body>
</html>
